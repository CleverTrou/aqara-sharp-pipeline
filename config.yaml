# =============================================================================
# SHARP Gaussian Splat Pipeline — Configuration
# =============================================================================
# Copy this file and fill in your actual values.
# Environment variables override these settings (see server.py docstring).

camera:
  # RTSP URL from your Aqara G5 Pro.
  # Find this in: Aqara App → Camera Settings → RTSP
  # The username/password are auto-generated by the app.
  # Use the Tailscale IP (100.x.x.x) of the device running the camera,
  # or the camera's LAN IP if the VPS can reach it.
  #
  # Resolutions: 360p, 1080p, 1520p (full)
  rtsp_url: "rtsp://USER:PASS@100.x.x.10:8554/1520p"

  # JPEG quality for the snapshot (1=best, 31=worst). 2 is excellent quality
  # at a reasonable file size (~500KB-1MB for 1520p).
  snapshot_quality: 2

  # RTSP transport protocol. TCP is more reliable over Tailscale;
  # UDP can drop packets on longer routes.
  rtsp_transport: "tcp"

sharp:
  # Device for SHARP inference.
  #   auto  — let SHARP pick (prefers CUDA > MPS > CPU)
  #   cuda  — force NVIDIA GPU
  #   cpu   — force CPU (slower, but works on any VPS)
  #   mps   — Apple Silicon only (not relevant for cloud VPS)
  device: "auto"

  # Timeout for SHARP prediction in seconds.
  # CPU: may take 10-30s. GPU: typically <1s.
  timeout_seconds: 120

server:
  host: "0.0.0.0"
  port: 8080

  # Where captured images and generated .ply files are stored.
  data_dir: "/data/sharp-pipeline"

  # Maximum number of splats to keep on disk. Oldest are deleted first.
  max_splats: 100

notifications:
  # Push notifications via ntfy.sh (free, open source).
  # Install the ntfy app on your iPhone to receive alerts.
  enabled: false
  ntfy_topic: ""          # e.g. "trevor-sharp-splats"
  ntfy_server: "https://ntfy.sh"

tailscale:
  # Include the Tailscale IP in notification links so you can
  # open the gallery directly from the push notification.
  use_tailscale_ip: true
